<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Marketing Measurement – Interactive</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style> body{font-family:'Inter',sans-serif} .chip{border-radius:9999px;padding:.25rem .6rem;cursor:pointer} .badge{border-radius:.5rem;padding:.15rem .45rem} </style>
  <!-- React 18 via CDN (works on GitHub Pages, no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-b from-blue-50 to-green-50 text-gray-800">
  <header class="max-w-6xl mx-auto px-6 py-10">
    <a href="https://valescabravo.github.io/" class="inline-flex items-center text-sm text-blue-700 hover:underline">← Back to Portfolio</a>
    <h1 class="text-3xl md:text-5xl font-extrabold mt-4 leading-tight">Unified Marketing Measurement
      <span class="block text-xl md:text-2xl font-semibold text-gray-600">Interactive infographic: MTA + MMM + Incrementality</span>
    </h1>
    <p class="mt-3 text-gray-700 max-w-3xl">Click the buttons, explore the models, and see how granular attribution and holistic modeling work together.</p>
    <div class="mt-4 flex flex-wrap gap-2">
      <span class="chip bg-blue-100 text-blue-800">Interactive</span>
      <span class="chip bg-emerald-100 text-emerald-800">Simplified</span>
      <span class="chip bg-purple-100 text-purple-800">GitHub Pages-ready</span>
    </div>
  </header>

  <main id="app" class="max-w-6xl mx-auto px-6 pb-20"></main>

  <footer class="text-center text-sm text-gray-500 pb-10">© 2026 Valesca Bravo — Interactive Lab</footer>

  <!-- App Script -->
  <script type="text/babel">
    const { useState } = React;

    const Card = ({ title, children, accent = 'indigo' }) => (
      <div className={`bg-white/90 backdrop-blur shadow rounded-2xl p-5 border-l-4 ${
        accent==='blue'?'border-blue-500':accent==='emerald'?'border-emerald-500':accent==='rose'?'border-rose-500':accent==='violet'?'border-violet-500':accent==='indigo'?'border-indigo-500':'border-amber-500'
      }`}>
        <h3 className="text-xl font-bold mb-2">{title}</h3>
        <div className="text-sm md:text-base text-gray-700">{children}</div>
      </div>
    );

    const StepChip = ({n,label,active,onClick}) => (
      <div onClick={onClick} className={`chip border text-xs ${active? 'bg-indigo-600 text-white border-indigo-700 shadow' : 'bg-white text-indigo-700 border-indigo-200 hover:bg-indigo-100'}`}>
        <span className="font-bold mr-1">{n}.</span>{label}
      </div>
    );

    function Venn(){
      return (
        <div className="relative w-full max-w-xl mx-auto h-64 md:h-72">
          <div className="absolute inset-0 flex items-center justify-center">
            <div className="relative w-64 h-64">
              <div className="absolute left-0 top-0 w-64 h-64 bg-blue-300/40 rounded-full blur-sm"></div>
              <div className="absolute right-0 top-0 w-64 h-64 bg-emerald-300/40 rounded-full blur-sm"></div>
              <div className="absolute inset-8 flex items-center justify-center">
                <div className="bg-white/80 backdrop-blur rounded-xl px-4 py-2 text-center shadow">
                  <div className="text-sm font-semibold">Unified Framework</div>
                  <div className="text-xs text-gray-600">Budget optimisation • Channel synergy • Incrementality</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Simple chart component for attribution models
    function AttributionChart({model}){
      let data = [];
      if(model==='linear') data=[25,25,25,25];
      else if(model==='decay') data=[10,20,30,40];
      else if(model==='pos') data=[30,10,10,50];
      else if(model==='last') data=[0,0,0,100];
      else data=[25,25,25,25];

      const colors = ["bg-blue-400","bg-green-400","bg-purple-400","bg-amber-400"];

      return (
        <div className="mt-4">
          <div className="flex gap-1 h-20 items-end">
            {data.map((val,i)=>(
              <div key={i} className={`flex-1 ${colors[i]} rounded-t transition-all duration-500`} style={{height:val+'%'}} title={`Step ${i+1}: ${val}%`}></div>
            ))}
          </div>
          <div className="flex justify-between text-xs text-gray-600 mt-1">
            <span>Step 1</span>
            <span>Step 2</span>
            <span>Step 3</span>
            <span>Step 4</span>
          </div>
        </div>
      );
    }

    function Progress({active, total=5}){
      const pct = Math.round((active/total)*100);
      return (
        <div className="w-full">
          <div className="flex justify-between text-xs text-gray-600 mb-1">
            <span>Step {active} of {total}</span>
            <span>{pct}%</span>
          </div>
          <div className="w-full h-2 bg-gray-200 rounded-full overflow-hidden" aria-label={`Progress ${pct}%`}>
            <div className="h-full bg-gradient-to-r from-indigo-500 to-emerald-500 transition-all duration-500" style={{width: pct+'%'}}></div>
          </div>
        </div>
      );
    }

    function App(){
      const [model, setModel] = useState('none');
      const [showAI, setShowAI] = useState(true);
      const [activeStep, setActiveStep] = useState(1);

      return (
        <div className="space-y-8">

          {/* Step chips as navigation */}
          <div className="space-y-3">
            <div className="flex flex-wrap gap-2">
              <StepChip n={1} label="Challenge" active={activeStep===1} onClick={()=>setActiveStep(1)} />
              <StepChip n={2} label="Two Pillars" active={activeStep===2} onClick={()=>setActiveStep(2)} />
              <StepChip n={3} label="Unified Framework" active={activeStep===3} onClick={()=>setActiveStep(3)} />
              <StepChip n={4} label="AI" active={activeStep===4} onClick={()=>setActiveStep(4)} />
              <StepChip n={5} label="Outcomes" active={activeStep===5} onClick={()=>setActiveStep(5)} />
            </div>
            <Progress active={activeStep} total={5} />
          </div>

          {/* Step Content */}
          {activeStep===1 && (
            <Card title="Step 1: The Challenge" accent="rose">
              <div className="grid md:grid-cols-3 gap-3">
                <div className="md:col-span-2 text-sm md:text-base">Cookies are fading and privacy rules are stronger. Click-only attribution is no longer enough.</div>
                <div className="flex md:justify-end gap-2">
                  <span className="badge bg-rose-100 text-rose-800 border border-rose-200">Cookie decline</span>
                  <span className="badge bg-amber-100 text-amber-800 border border-amber-200">Privacy regulations</span>
                  <span className="badge bg-blue-100 text-blue-800 border border-blue-200">Offline impact</span>
                </div>
              </div>
            </Card>
          )}

          {activeStep===2 && (
            <section className="grid md:grid-cols-2 gap-6">
              <div className="space-y-3">
                <h2 className="text-2xl font-extrabold text-blue-700">Multi-Touch Attribution (MTA)</h2>
                <Card title="Granular, bottom-up" accent="blue">
                  <p>Tracks each step before conversion.</p>
                  <ul className="list-disc list-inside space-y-1 mt-2">
                    <li>Uses pixels and UTM parameters.</li>
                    <li>Useful for channel-level optimisation.</li>
                  </ul>
                  <div className="mt-3 text-sm">
                    <div className="font-semibold mb-1">Attribution models:</div>
                    <div className="flex flex-wrap gap-2">
                      <button className={`chip border ${model==='linear'?'bg-blue-600 text-white border-blue-700':'bg-white text-blue-700 border-blue-200'}`} onClick={()=>setModel('linear')}>Linear</button>
                      <button className={`chip border ${model==='decay'?'bg-blue-600 text-white border-blue-700':'bg-white text-blue-700 border-blue-200'}`} onClick={()=>setModel('decay')}>Time Decay</button>
                      <button className={`chip border ${model==='pos'?'bg-blue-600 text-white border-blue-700':'bg-white text-blue-700 border-blue-200'}`} onClick={()=>setModel('pos')}>Position-Based</button>
                      <button className={`chip border ${model==='last'?'bg-blue-600 text-white border-blue-700':'bg-white text-blue-700 border-blue-200'}`} onClick={()=>setModel('last')}>Last Click</button>
                    </div>
                    <div className="mt-3 bg-blue-50 border border-blue-200 rounded-xl p-3">
                      {model==='linear' && 'Linear: credit is distributed equally across all steps.'}
                      {model==='decay' && 'Time Decay: later steps receive more credit.'}
                      {model==='pos' && 'Position-Based: first and last steps receive more credit.'}
                      {model==='last' && 'Last Click: all credit goes to the final interaction.'}
                      {model==='none' && 'Select a model to see how credit is assigned.'}
                    </div>
                    {model!=='none' && <AttributionChart model={model} />}
                  </div>
                </Card>
              </div>

              <div className="space-y-3">
                <h2 className="text-2xl font-extrabold text-emerald-700">Marketing Mix Modeling (MMM)</h2>
                <Card title="Macro, top-down" accent="emerald">
                  <p>Uses historical and aggregated data to measure impact.</p>
                  <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                    <div className="p-2 bg-emerald-50 border border-emerald-200 rounded">TV/Radio</div>
                    <div className="p-2 bg-emerald-50 border border-emerald-200 rounded">Digital</div>
                    <div className="p-2 bg-emerald-50 border border-emerald-200 rounded">Seasonality</div>
                    <div className="p-2 bg-emerald-50 border border-emerald-200 rounded">Economy</div>
                  </div>
                  <p className="mt-2 text-sm">Covers both online and offline, privacy-safe.</p>
                </Card>
              </div>
            </section>
          )}

          {activeStep===3 && (
            <Card title="Step 3: Unified Framework" accent="violet">
              <div className="grid md:grid-cols-3 gap-4 items-center">
                <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm">MTA: granular digital data</div>
                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-sm">MMM: channel performance and external factors</div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm">Incrementality testing: A/B, geo-lift</div>
              </div>
              <Venn />
              <div className="text-sm text-gray-700 mt-2">No single source of truth — integration provides resilience and better decisions.</div>
            </Card>
          )}

          {activeStep===4 && (
            <Card title="Step 4: AI" accent="indigo">
              <div className="flex flex-col md:flex-row md:items-center gap-3">
                <div className="text-sm md:text-base">AI accelerates modeling, improves attribution, and enables scenario planning.</div>
                <label className="inline-flex items-center gap-2 text-xs"><input type="checkbox" className="accent-indigo-600" checked={showAI} onChange={()=>setShowAI(!showAI)}/> Show AI tips</label>
              </div>
              {showAI && (
                <ul className="mt-3 text-sm grid md:grid-cols-3 gap-2">
                  <li className="p-2 bg-indigo-50 border border-indigo-200 rounded">Faster model updates</li>
                  <li className="p-2 bg-indigo-50 border border-indigo-200 rounded">Forecasting and scenarios</li>
                  <li className="p-2 bg-indigo-50 border border-indigo-200 rounded">Signal recovery without cookies</li>
                </ul>
              )}
            </Card>
          )}

          {activeStep===5 && (
            <Card title="Step 5: Outcomes" accent="amber">
              <div className="grid md:grid-cols-3 gap-3 text-sm">
                <div className="p-3 bg-white border rounded-xl"><span className="font-semibold">Optimised spending</span><div>Budget allocation across channels for maximum return.</div></div>
                <div className="p-3 bg-white border rounded-xl"><span className="font-semibold">Holistic view</span><div>Complete picture of marketing effectiveness.</div></div>
                <div className="p-3 bg-white border rounded-xl"><span className="font-semibold">Data-driven decisions</span><div>Confident strategies in complex markets.</div></div>
              </div>
            </Card>
          )}

          <div className="text-center text-sm text-gray-600">Tip: Use the step buttons above to navigate through the framework.</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
</body>
</html>
